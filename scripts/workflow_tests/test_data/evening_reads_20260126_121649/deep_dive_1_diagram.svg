<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#1e40af">NAIP Volcanism and PETM: Chronological Sequence</text>
  
  <!-- Timeline axis -->
  <line x1="80" y1="350" x2="820" y2="350" stroke="#333" stroke-width="3"/>
  
  <!-- Time markers -->
  <line x1="80" y1="340" x2="80" y2="360" stroke="#333" stroke-width="2"/>
  <text x="80" y="380" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#333">-25k years</text>
  
  <line x1="230" y1="340" x2="230" y2="360" stroke="#333" stroke-width="2"/>
  <text x="230" y="380" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#333">PETM Start</text>
  <text x="230" y="395" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#333">(0)</text>
  
  <line x1="450" y1="340" x2="450" y2="360" stroke="#333" stroke-width="2"/>
  <text x="450" y="380" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#333">+75k years</text>
  
  <line x1="670" y1="340" x2="670" y2="360" stroke="#333" stroke-width="2"/>
  <text x="670" y="380" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#333">+150k years</text>
  
  <line x1="820" y1="340" x2="820" y2="360" stroke="#333" stroke-width="2"/>
  <text x="820" y="380" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#333">+200k years</text>
  
  <!-- Event 1: Osmium Anomaly -->
  <rect x="90" y="120" width="120" height="70" fill="#e0f2fe" stroke="#2563eb" stroke-width="2" rx="8"/>
  <text x="150" y="145" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e40af">Osmium</text>
  <text x="150" y="162" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e40af">Isotope Drop</text>
  <text x="150" y="182" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Pre-PETM</text>
  <line x1="150" y1="190" x2="150" y2="340" stroke="#2563eb" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="150" y="410" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">18-23k years</text>
  <text x="150" y="425" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">before onset</text>
  
  <!-- Event 2: NAIP Intensification -->
  <rect x="100" y="225" width="120" height="60" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="160" y="248" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#d97706">NAIP Volcanic</text>
  <text x="160" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#d97706">Activity</text>
  <text x="160" y="280" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#92400e">Intensifies</text>
  
  <!-- Event 3: PETM Onset & CIE -->
  <rect x="240" y="90" width="100" height="80" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="8"/>
  <text x="290" y="115" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#991b1b">PETM Onset</text>
  <text x="290" y="135" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#991b1b">Carbon</text>
  <text x="290" y="150" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#991b1b">Isotope</text>
  <text x="290" y="165" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#991b1b">Excursion</text>
  <line x1="290" y1="170" x2="290" y2="340" stroke="#dc2626" stroke-width="2"/>
  
  <!-- Event 4: Peak Warming -->
  <rect x="370" y="110" width="90" height="70" fill="#fecaca" stroke="#dc2626" stroke-width="2" rx="8"/>
  <text x="415" y="135" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#991b1b">Peak</text>
  <text x="415" y="152" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#991b1b">Warming</text>
  <text x="415" y="172" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#7f1d1d">(5-6°C rise)</text>
  
  <!-- Event 5: Mercury Spike 1 -->
  <circle cx="150" cy="470" r="25" fill="#a78bfa" stroke="#7c3aed" stroke-width="2"/>
  <text x="150" y="472" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">Hg</text>
  <text x="150" y="485" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">Spike</text>
  <text x="150" y="510" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#6d28d9">Pre-PETM</text>
  
  <!-- Sustained Volcanic Period -->
  <rect x="240" y="215" width="430" height="70" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="8" opacity="0.7"/>
  <text x="455" y="240" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#d97706">Sustained Volcanic Input Period</text>
  <text x="455" y="260" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#92400e">Continuous Unradiogenic Osmium Signature</text>
  <text x="455" y="278" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#78350f">Through PETM Duration</text>
  
  <!-- Event 6: Recovery Phase -->
  <rect x="680" y="100" width="120" height="80" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="740" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#047857">Recovery</text>
  <text x="740" y="142" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#047857">Phase</text>
  <text x="740" y="162" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#065f46">(Late PETM)</text>
  <text x="740" y="177" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#065f46">150-200k yrs</text>
  <line x1="740" y1="180" x2="740" y2="340" stroke="#10b981" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Event 7: Mercury Spike 2 -->
  <circle cx="740" cy="470" r="25" fill="#a78bfa" stroke="#7c3aed" stroke-width="2"/>
  <text x="740" y="472" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">Hg</text>
  <text x="740" y="485" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">Spike</text>
  <text x="740" y="510" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#6d28d9">Recovery</text>
  
  <!-- PETM Duration bracket -->
  <line x1="230" y1="620" x2="820" y2="620" stroke="#dc2626" stroke-width="2"/>
  <line x1="230" y1="610" x2="230" y2="630" stroke="#dc2626" stroke-width="2"/>
  <line x1="820" y1="610" x2="820" y2="630" stroke="#dc2626" stroke-width="2"/>
  <text x="525" y="650" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#991b1b">PETM Duration: ~150-200k years</text>
  
  <!-- Legend -->
  <rect x="30" y="550" width="180" height="120" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" rx="6"/>
  <text x="120" y="570" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">Legend</text>
  <rect x="40" y="580" width="15" height="15" fill="#e0f2fe" stroke="#2563eb" stroke-width="1"/>
  <text x="62" y="592" font-family="Arial, sans-serif" font-size="11" fill="#333">Osmium Signal</text>
  <rect x="40" y="600" width="15" height="15" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="62" y="612" font-family="Arial, sans-serif" font-size="11" fill="#333">Volcanic Activity</text>
  <rect x="40" y="620" width="15" height="15" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="62" y="632" font-family="Arial, sans-serif" font-size="11" fill="#333">Warming Event</text>
  <circle cx="47" cy="647" r="7" fill="#a78bfa" stroke="#7c3aed" stroke-width="1"/>
  <text x="62" y="652" font-family="Arial, sans-serif" font-size="11" fill="#333">Mercury Anomaly</text>
</svg>